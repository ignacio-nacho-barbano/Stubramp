# Fly.io config for the Stubramp API.
#
# This config + the Dockerfile live in apps/api, but the app is a pnpm workspace
# package, so the Docker BUILD CONTEXT must be the monorepo ROOT (the build needs
# pnpm-workspace.yaml, pnpm-lock.yaml and packages/*). Fly's build context is the
# positional WORKING_DIRECTORY, so deploy from the repo root, pointing the
# Docker paths back at apps/api. The root package.json wraps this as a script:
#   pnpm deploy:api
# which expands to:
#   fly deploy . -c apps/api/fly.toml \
#     --dockerfile apps/api/Dockerfile \
#     --ignorefile apps/api/Dockerfile.dockerignore --ha=false

# iad = Ashburn, Virginia.
app = "stubramp-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Runs once before each deploy is released, in a throwaway machine using the
# freshly built image. Applies pending migrations; a failure aborts the deploy.
# Prisma reads the datasource URL from prisma.config.ts, which prefers
# DATABASE_URL_UNPOOLED (a direct, non-PgBouncer connection) — set that secret,
# as migrations can't run reliably over the pooled endpoint.
#
# The Neon branch compute autosuspends (scale-to-zero), so the release machine's
# first connection has to wake it. A cold start can exceed Prisma's connect
# timeout and fail with P1001 ("can't reach database server") — which would
# abort the whole deploy even when there are no pending migrations. Retry a few
# times: the first attempt wakes the compute, later attempts hit a warm one.
[deploy]
  release_command = "sh -c 'n=0; until npx prisma migrate deploy; do n=$((n+1)); if [ $n -ge 5 ]; then exit 1; fi; echo \"migrate attempt $n failed (likely Neon cold start), retrying in 5s...\"; sleep 5; done'"

[env]
  HOST = "0.0.0.0"
  PORT = "3001"
  NODE_ENV = "production"
  # The browser SPA origin — the sole allowed CORS origin (credentials mode
  # disallows the `*` wildcard).
  APP_URL = "https://app.stubramp.barbano.uy"
  # Parent domain the httpOnly session cookies are scoped to, so they're shared
  # across the app + api subdomains.
  COOKIE_DOMAIN = ".stubramp.barbano.uy"
  # Sentry error monitoring. A DSN is a public identifier (not a secret), so it
  # lives here rather than in `fly secrets`.
  SENTRY_DSN = "https://daec2b1543ac69ac4128afcee42b6249@o4511689468608512.ingest.de.sentry.io/4511689520382032"

# Keep one machine always running to avoid Fly cold starts (the ~seconds-long
# wake on the first request after idle). This trades the scale-to-zero savings
# for a warm API; Neon is kept warm separately by .github/workflows/keep-alive.
# Still a single machine (no HA standby): `fly deploy --ha=false`.
[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # /health runs `SELECT 1`, so a cold-start Neon wake can make it slow. The
  # check timeout MUST exceed the pool's connectionTimeoutMillis (30s, see
  # apps/api/src/db.ts) — otherwise Fly evicts the only machine before the DB
  # connect can even finish, taking the whole API down during a routine cold
  # start. Generous grace covers the wake on a fresh boot.
  [[http_service.checks]]
    interval = "30s"
    timeout = "31s"
    grace_period = "45s"
    method = "GET"
    path = "/health"

# Smallest/cheapest VM. Bump memory to 512mb if the app OOMs under load.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
